<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista de Compras</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .user-name {
            font-size: 24px;
            font-weight: 600;
        }

        .edit-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .edit-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .main-content {
            padding: 30px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="text"], input[type="file"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="file"]:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-sm {
            padding: 10px 16px;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(67, 233, 123, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffa726 0%, #ff7043 100%);
            color: white;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 167, 38, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(250, 112, 154, 0.4);
        }

        .lists-container {
            display: grid;
            gap: 20px;
            margin-top: 30px;
        }

        .list-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .list-card.active {
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
        }

        .list-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .list-title-container {
            flex: 1;
        }

        .list-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .list-title-input {
            font-size: 20px;
            font-weight: 600;
            padding: 8px 12px;
            border: 2px solid #4facfe;
            border-radius: 8px;
            width: 100%;
            max-width: 300px;
        }

        .list-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .items-list {
            list-style: none;
            min-height: 100px;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
        }

        .item:hover {
            background: #e3f2fd;
            transform: translateX(5px);
        }

        .item-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            accent-color: #4facfe;
            cursor: pointer;
        }

        .item-text {
            flex: 1;
            font-size: 16px;
            color: #555;
            padding: 5px 10px;
            cursor: pointer;
        }

        .item-text.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .item-edit-input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #4facfe;
            border-radius: 8px;
            font-size: 16px;
            margin-right: 10px;
        }

        .item-actions {
            display: flex;
            gap: 8px;
        }

        .item-edit, .item-save, .item-cancel, .item-delete {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .item-edit {
            background: #4facfe;
            color: white;
        }

        .item-save {
            background: #43e97b;
            color: white;
        }

        .item-cancel {
            background: #ffa726;
            color: white;
        }

        .item-delete {
            background: #ff6b6b;
            color: white;
        }

        .item-edit:hover, .item-save:hover, .item-cancel:hover, .item-delete:hover {
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }

        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #333;
        }

        @media (max-width: 768px) {
            .input-group {
                flex-direction: column;
            }
            
            .user-info {
                flex-direction: column;
                gap: 15px;
            }
            
            .list-actions {
                flex-direction: column;
                width: 100%;
            }
            
            .btn-sm {
                width: 100%;
                justify-content: center;
            }
            
            .item {
                flex-wrap: wrap;
            }
            
            .item-actions {
                margin-top: 10px;
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="user-info">
                <img id="userAvatar" class="avatar" src="" alt="Avatar" style="background: #ddd;">
                <div>
                    <div class="user-name" id="userName">Tu Nombre</div>
                    <button class="edit-btn" onclick="openUserModal()">✏️ Editar</button>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="input-section">
                <div class="input-group">
                    <input type="text" id="productInput" placeholder="¿Qué quieres comprar?">
                    <button class="btn btn-primary" onclick="addProduct()">
                        ➕ Agregar
                    </button>
                </div>
                <div class="input-group">
                    <input type="text" id="listNameInput" placeholder="Nombre de la lista (opcional)">
                    <button class="btn btn-success" onclick="createNewList()">
                        📋 Nueva Lista
                    </button>
                </div>
            </div>

            <div class="lists-container" id="listsContainer">
                <!-- Las listas se cargarán aquí dinámicamente -->
            </div>
        </div>
    </div>

    <!-- Modal para editar usuario -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeUserModal()">&times;</span>
            <h2>Editar Perfil</h2>
            <div style="margin: 20px 0;">
                <label>Nombre completo:</label>
                <input type="text" id="editNameInput" style="width: 100%; margin-top: 10px; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>
            <div style="margin: 20px 0;">
                <label>Foto de perfil:</label>
                <input type="file" id="avatarInput" accept="image/*" style="width: 100%; margin-top: 10px;">
            </div>
            <button class="btn btn-primary" onclick="saveUserInfo()" style="width: 100%;">Guardar</button>
        </div>
    </div>

    <script>
        let currentListId = null;
        let editingItem = null;
        let editingListName = null;
        let lists = JSON.parse(localStorage.getItem('shoppingLists')) || [];
        let userInfo = JSON.parse(localStorage.getItem('userInfo')) || {
            name: 'Tu Nombre',
            avatar: ''
        };

        // Inicializar app
        document.addEventListener('DOMContentLoaded', function() {
            loadUserInfo();
            renderLists();
            document.getElementById('productInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addProduct();
            });
        });

        function loadUserInfo() {
            document.getElementById('userName').textContent = userInfo.name;
            if (userInfo.avatar) {
                document.getElementById('userAvatar').src = userInfo.avatar;
            }
            document.getElementById('editNameInput').value = userInfo.name;
        }

        function openUserModal() {
            document.getElementById('userModal').style.display = 'block';
        }

        function closeUserModal() {
            document.getElementById('userModal').style.display = 'none';
        }

        function saveUserInfo() {
            userInfo.name = document.getElementById('editNameInput').value || 'Tu Nombre';
            
            const fileInput = document.getElementById('avatarInput');
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    userInfo.avatar = e.target.result;
                    document.getElementById('userAvatar').src = userInfo.avatar;
                    localStorage.setItem('userInfo', JSON.stringify(userInfo));
                    closeUserModal();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                document.getElementById('userName').textContent = userInfo.name;
                localStorage.setItem('userInfo', JSON.stringify(userInfo));
                closeUserModal();
            }
        }

        function createNewList() {
            const name = document.getElementById('listNameInput').value.trim() || `Lista ${lists.length + 1}`;
            const newList = {
                id: Date.now().toString(),
                name: name,
                items: [],
                createdAt: new Date().toLocaleDateString('es-ES')
            };
            lists.unshift(newList);
            saveLists();
            renderLists();
            document.getElementById('listNameInput').value = '';
            setCurrentList(newList.id);
        }

        function addProduct() {
            const input = document.getElementById('productInput');
            const productName = input.value.trim();
            
            if (!productName) return;
            
            if (!currentListId) {
                createNewList();
                return;
            }
            
            const list = lists.find(l => l.id === currentListId);
            if (list) {
                list.items.push({
                    id: Date.now().toString(),
                    name: productName,
                    completed: false
                });
                saveLists();
                renderLists();
                input.value = '';
            }
        }

        function deleteItem(listId, itemId) {
            if (confirm('¿Estás seguro de que quieres eliminar este producto?')) {
                const list = lists.find(l => l.id === listId);
                if (list) {
                    list.items = list.items.filter(item => item.id !== itemId);
                    saveLists();
                    renderLists();
                }
            }
        }

        function toggleComplete(listId, itemId) {
            const list = lists.find(l => l.id === listId);
            const item = list?.items.find(i => i.id === itemId);
            if (item) {
                item.completed = !item.completed;
                saveLists();
                renderLists();
            }
        }

        function startEditItem(listId, itemId) {
            editingItem = { listId, itemId };
            renderLists();
        }

        function saveEditItem(listId, itemId, newName) {
            const list = lists.find(l => l.id === listId);
            const item = list?.items.find(i => i.id === itemId);
            
            if (item && newName && newName.trim()) {
                item.name = newName.trim();
                editingItem = null;
                saveLists();
                renderLists();
            }
        }

        function cancelEditItem() {
            editingItem = null;
            renderLists();
        }

        function startEditListName(listId) {
            editingListName = listId;
            renderLists();
        }

        function saveEditListName(listId, newName) {
            const list = lists.find(l => l.id === listId);
            if (list && newName && newName.trim()) {
                list.name = newName.trim();
                editingListName = null;
                saveLists();
                renderLists();
            }
        }

        function cancelEditListName() {
            editingListName = null;
            renderLists();
        }

        function deleteList(listId) {
            if (confirm('¿Estás seguro de que quieres eliminar esta lista?')) {
                lists = lists.filter(l => l.id !== listId);
                saveLists();
                renderLists();
                if (currentListId === listId) {
                    currentListId = null;
                }
            }
        }

        function shareList(listId) {
            const list = lists.find(l => l.id === listId);
            if (!list) return;

            const user = userInfo.name !== 'Tu Nombre' ? ` de ${userInfo.name}` : '';
            const itemsText = list.items.map(item => `• ${item.name} ${item.completed ? '✅' : '⬜'}`).join('\n');
            const message = `🛒 Lista de compras${user}\n\n${list.name}\n${itemsText || '📝 Vacía'}\n\n📅 ${list.createdAt}`;
            
            const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        function setCurrentList(listId) {
            currentListId = listId;
            renderLists();
        }

        function saveLists() {
            localStorage.setItem('shoppingLists', JSON.stringify(lists));
        }

        function renderLists() {
            const container = document.getElementById('listsContainer');
            
            if (lists.length === 0) {
                container.innerHTML = `
                    <div class="list-card empty-state">
                        <div style="font-size: 48px;">🛒</div>
                        <h3>No tienes listas</h3>
                        <p>Crea tu primera lista de compras</p>
                        <button class="btn btn-primary" onclick="createNewList()">Crear primera lista</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = lists.map(list => `
                <div class="list-card ${currentListId === list.id ? 'active' : ''}">
                    <div class="list-header">
                        <div class="list-title-container">
                            ${editingListName === list.id ? `
                                <input type="text" class="list-title-input" id="edit-list-${list.id}" value="${list.name}" placeholder="Nombre de la lista">
                            ` : `
                                <h3 class="list-title">${list.name}</h3>
                            `}
                            <small style="color: #888;">${list.createdAt} • ${list.items.length} productos</small>
                        </div>
                        <div class="list-actions">
                            ${editingListName === list.id ? `
                                <button class="btn btn-success btn-sm" onclick="saveEditListName('${list.id}', document.getElementById('edit-list-${list.id}').value)">💾 Guardar</button>
                                <button class="btn btn-danger btn-sm" onclick="cancelEditListName()">✖ Cancelar</button>
                            ` : `
                                <button class="btn btn-warning btn-sm" onclick="startEditListName('${list.id}')">✏️ Renombrar</button>
                            `}
                            <button class="btn btn-success btn-sm" onclick="setCurrentList('${list.id}')">✏️ Editar</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteList('${list.id}')">🗑️ Eliminar</button>
                            <button class="btn btn-primary btn-sm" onclick="shareList('${list.id}')">📱 WhatsApp</button>
                        </div>
                    </div>
                    ${list.items.length > 0 ? `
                        <ul class="items-list">
                            ${list.items.map(item => `
                                <li class="item">
                                    ${currentListId === list.id ? `
                                        <input type="checkbox" class="item-checkbox" ${item.completed ? 'checked' : ''} onchange="toggleComplete('${list.id}', '${item.id}')">
                                    ` : ''}
                                    
                                    ${editingItem && editingItem.listId === list.id && editingItem.itemId === item.id ? `
                                        <input type="text" class="item-edit-input" id="edit-${item.id}" value="${item.name}" placeholder="Nombre del producto" autofocus>
                                        <div class="item-actions">
                                            <button class="item-save" onclick="saveEditItem('${list.id}', '${item.id}', document.getElementById('edit-${item.id}').value)">💾</button>
                                            <button class="item-cancel" onclick="cancelEditItem()">✖</button>
                                        </div>
                                    ` : `
                                        <span class="item-text ${item.completed ? 'completed' : ''}" onclick="${currentListId === list.id ? `startEditItem('${list.id}', '${item.id}')` : ''}">${item.name}</span>
                                        ${currentListId === list.id && !editingItem ? `
                                            <div class="item-actions">
                                                <button class="item-edit" onclick="startEditItem('${list.id}', '${item.id}')">✏️</button>
                                                <button class="item-delete" onclick="deleteItem('${list.id}', '${item.id}')">🗑️</button>
                                            </div>
                                        ` : ''}
                                    `}
                                </li>
                            `).join('')}
                        </ul>
                    ` : `
                        <div class="empty-state" style="padding: 20px;">
                            <div style="font-size: 32px;">📝</div>
                            <p>Esta lista está vacía. Selecciona "Editar" para agregar productos.</p>
                        </div>
                    `}
                </div>
            `).join('');
        }

        // Cerrar modal al hacer clic fuera
        window.onclick = function(event) {
            const modal = document.getElementById('userModal');
            if (event.target === modal) {
                closeUserModal();
            }
        }
    </script>
</body>
</html>
